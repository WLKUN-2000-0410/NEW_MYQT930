<button type="button" class="btn btn-outline-secondary btn-sm" style="float: right"  onclick="main.showToolsBox($.i18n.prop('main-tools-add'),30)" >
    <img src="source/image/add.png" alt="">
</button>
<script>
    $("#tools li button").click(function () {
    	$(this).attr("btntype");
        let title = $(this).attr("title")
        let index = Number(true?$(this).attr("btntype"):$(this).parent('li').index())
        switch (index) {
            case 0:{
                if (fConfig.funnm === 0) {
                    steady.startScan()
                }
                if(fConfig.funnm === 1){
                    wavelength.startScan()
                }
                if (fConfig.funnm === 2) {
                	polar.startScan()
                }

            }break;
            case 1:{
                if (fConfig.funnm === 0) {
                    steady.stopScan()
                }
                if(fConfig.funnm === 1){
                   wavelength.stopScan()
                }
                if (fConfig.funnm === 2) {
                	polar.stopScan()
                }

            }break;
            case 3:{
                main.openFile("toolsOpen")
            }break
            case 4:{
                main.saveFile()
            }break
            case 6:
            case 31:
            case 7:{
                let src = index ===6?"html/scan/steady.html":index ===7?"html/scan/wavelength.html":"html/scan/polarization.html"
                fConfig.funnm = index===6?0:index===7?1:2
                $("#steadyScan").prop('disabled',fConfig.funnm===0)
                $("#waveScan").prop('disabled',fConfig.funnm===1)
                $("#polarScan").prop('disabled',fConfig.funnm===2)
                $("#mSteadyScan").prop('disabled',fConfig.funnm===0)
                $("#mWaveScan").prop('disabled',fConfig.funnm===1)
                $("#mPolarScan").prop('disabled',fConfig.funnm===2)
                $("#mainChart").prop('hidden',index===31);
                $("#mainPolarChart").prop('hidden',index<31);
                console.log(fConfig.funnm);
	            if(fConfig.funnm===0){
	            	fConfig.spectrumUnit = $("#waveFUnit").html();
	            	if(fConfig.spectrumUnit=="nm"){
	            		fConfig.waveFrom = parseFloat($("#waveFrom").attr("nm")) 
	            		fConfig.waveTo = parseFloat($("#waveTo").attr("nm"))
	            	}else{
		            	fConfig.waveFrom = parseFloat($("#waveFrom").val()) 
		            	fConfig.waveTo = parseFloat($("#waveTo").val())	
	            	}
	            	
	            }else if(fConfig.funnm===1){
	            	fConfig.steadyUnit = $("#steadyUnit").html();
	            	if(fConfig.steadyUnit=="nm"){
	            		fConfig.steadyCenter = parseFloat($("#steadyCW").attr("nm"));
	            	}else{
		            	fConfig.steadyCenter = parseFloat($("#steadyCW").val());
	            	}
	            }else{
	            	fConfig.polarUnit = $("#polarUnit").html();
	            	if(fConfig.polarUnit=="nm"){
	            		fConfig.polarCenter = parseFloat($("#polarCW").attr("nm"));
	            	}else{
		            	fConfig.polarCenter = parseFloat($("#polarCW").val());
	            	}
	            }
                websocket.send(funcCode.TestModeChange,{funNm:fConfig.funnm},false)
                main.setCallbacks(funcCode.TestModeChange,(rev)=>{
		            $("#mainBodyLeft").load(src)
		        })
            }break;
            // case 9:{
            //    window.open("html/mapping/mapping.html","Mapping测试")
            //    // let p = {c:fConfig.centerwave,exp:fConfig.expTime,slit:fConfig.slit,acc:fConfig.totalnum}
            //     localStorage.setItem("p",JSON.stringify(fConfig))
            // }break
            default:{
                main.showToolsBox(title,index)
            }break
        }
    })
</script>
