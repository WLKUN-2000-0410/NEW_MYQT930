<script>
    $('#toolsManger li input[type=checkbox]').click(function () {
        let isShow = $(this).prop('checked')
        let index = Number($(this).parent('li').attr("btnType"))
        let bgColor = isShow ? '#2b2b2b' : '#5d5d5d';
        $(this).next('div').find('p').css("backgroundColor",bgColor)
        $(this).next('div').css('backgroundColor',bgColor )
        main.isShowTools(isShow,index)
    })
</script>
