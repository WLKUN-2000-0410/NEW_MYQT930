<style>
    .w-20{width: 20%!important;}
    .w-70{width: 70%!important;}
</style>
<div class="w-100 h-100 d-flex align-items-center flex-column">
    <div class="w-100 h-75 d-flex flex-column align-items-center justify-content-center bg-dark border border-secondary">
        <div class="d-flex align-items-center w-100 mt-2">
            <span class="w-20 text-right"><!--Select file path-->选择文件路径</span>
            <input type="text" class="mx-2 w-70 text-left px-2" id="exportFilePath" disabled>
            <button type="button" class="btn btn-secondary btn-sm" onclick="openFileSystem()">打开</button>
        </div>
        <div class="d-flex align-items-center w-100 mt-2">
            <span class="w-20 text-right"><!--File saving progress-->文件保存进度</span>
            <div  id="mProgress3" class="progress w-70 ml-2">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 25%">25%</div>
            </div>
        </div>
    </div>
    <div class="w-100 text-right mt-3">
        <button type="button" class="btn btn-secondary btn-sm"  id="startExport" onclick="startSaveData()">开始</button>
        <button type="button" class="btn btn-secondary btn-sm" disabled id="stopExport" onclick="stopSaveData()">停止</button>
    </div>
</div>
<script>
    let code,data
    function initExportBox(c,d) {
        code=c;data=d
    }
    function openFileSystem() {
        let suc = function () {
            main.getSavefilePathPram()
            $("div.fileType select").val(".txt");
            $("div .fileType select option[value='.hdr']").hide()
            $("div .fileType select option[value='.png']").hide()
            $("div .fileType select option[value='.jpg']").hide()
            $("div .fileType select option[value='.csv']").hide()
        }
        let end = function(){
            if (main.isOpenChecked) {
                main.isOpenChecked=false;
                data.filePath = main.openFilePath
                $("#exportFilePath").val(data.filePath)
            }
        }
        main.exportFilePath(suc,end)
    }
    function startSaveData() {
        if(data.filePath==='') return jeBox.msg($.i18n.prop('tips-mapping-filepath'),{icon:1})
        updateState(true)
        $("#mProgress3 .progress-bar").css("width", 0 + "%").text('');
        websocket.send(code,data,false)
    }
    function stopSaveData() {
        $("#mProgress3 .progress-bar").css("width", 0 + "%").text('');
        updateState(false)
        websocket.send(funcCode.stopExportAllFile,{})
    }
    function updateState(flag) {
         $("#startExport").prop('disabled',flag)
         $("#stopExport").prop('disabled',!flag)
    }
    function updateProcess(cur,total) {
        let num = cur + "/" + total
        let width = Math.round(cur / total * 100)
        $("#mProgress3 .progress-bar").css("width", width + "%").text(num);
        if (cur === total) updateState(false)

    }
</script>
