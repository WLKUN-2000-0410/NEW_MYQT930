    <style>
    	div#saveFilePath{

    	div#saveFilePath>div.file-content>div.file-content-right{

    	div#saveFilePath>div.file-bottom>div{

    	div#saveFilePath>div.file-bottom input{

    	div#saveFilePath>div.file-bottom select{

    <div id="saveFilePath">
    	<div class="file-title" style="margin-left: 10px;">
    		<button class="je-btn"><i class="je-icon je-f18">&#xe613;</i></button>
    		<button class="je-btn"><i class="je-icon je-f18">&#xe627;</i></button>
    		<input id="filePathShow" class="je-input" style="" disabled="disabled" />
    	</div>
    	<div class="file-content je-por">
    		<div class="file-content-left je-poa"></div>
    		<div class="file-content-right je-poa"></div>
    		<div class="file-hide je-hide je-poa"></div>
    		<div class="file-show-iteam je-poa je-hide">
    			<div data-locale="popup-file-newFile">新建文件夹</div>
    			<div data-locale="popup-file-checkedAll">全选</div>
    		</div>
    	</div>
    	<div class="file-bottom">
    		<div class="fileName" hidden>
    			<span class="je-ga" data-locale="popup-file-name">文件名</span>
    			<input class="je-input" disabled="disabled"/>
    			<select class="je-select">
					<option value=".txt"  data-locale="popup-file-type1">文本文档(*.txt)</option>
					<option value=".hdr" data-locale="popup-file-type2">ENVI文件(*.hdr,*.raw)</option>
					<option value=".bck" data-locale="popup-file-type3">bck文件(*.bck)</option>
					<option value=".sysp" data-locale="popup-file-type4">SYSP文件(*.sysp)</option>
    				<option value="*.*" data-locale="popup-file-type5">所有文件(*.*)</option>
    			</select>
    		</div>
    		<div class="btSaveFile mt-4">
    			<button class="je-btn openFile" data-locale="popup-file-open">打开</button>
    			<button class="je-btn cancelFile" data-locale="popup-file-cancel">取消</button>
    		</div>
    	</div>
    </div>
<script>
	var strJson = ["C:\\Users\\Lenovo\\Desktop\\","C:\\Users\\Lenovo\\Downloads\\",
	"C:\\Users\\Lenovo\\Documents\\","C:\\Users\\Lenovo\\Pictures\\"];
	websocket.send(funcCode.GetDrivers,{},false)
    main.setCallbacks(funcCode.GetDrivers,rev=>{
    	let user = rev.getStrusername()
		strJson = strJson.map(cur=>{return cur.replace('Lenovo',user)})
    	for (var i = 0; i < rev.getDriversList().length; i++) {
    		strJson.push(rev.getDriversList()[i]); 
    	}
        updateRoot(strJson);
    	main.translate(undefined)
    })
    
    var isBool = false;
    var isDown = false;
    var nStart = 0;
    var nEnd = 0;
    $(window).keydown(function(e){
		if (e.keyCode==17) {
			isBool= true;
		}else if(e.keyCode==65){
			isBool=false;
			
		}
		
		e.stopPropagation();
		return ;
	});
	$(window).keyup(function(e){
		if (e.keyCode==17) {
			isBool=false;
		}
	});
	/**
	 * 根文件目录
	 * @param {Array} rootPath 根文件目录
	 */
	function updateRoot(rootPath){
		for (var i = 0; i < rootPath.length; i++) {
			var itemhtml="";
			if (rootPath[i].indexOf("Desktop")>0) {
				itemhtml ="<div fileUrl='"+rootPath[i]
				+"'><i class='icon iconfont icon-shouzhuomian je-blue'></i><span data-locale='popup-file-desktop' class='je-g0'>"+
				"桌面"+"</span></div>";
			}else if (rootPath[i].indexOf("Downloads")>0) {
				itemhtml ="<div fileUrl='"+rootPath[i]
				+"'><i class='icon iconfont icon-download-1-copy je-blue'></i><span data-locale='popup-file-download' class='je-g0'>"+
				"下载"+"</span></div>";
			}else if (rootPath[i].indexOf("Documents")>0) {
				itemhtml ="<div fileUrl='"+rootPath[i]
				+"'><i class='icon iconfont icon-shiyongwendang je-yellow'></i><span data-locale='popup-file-document' class='je-g0'>"+
				"文档"+"</span></div>";
			}else if (rootPath[i].indexOf("Pictures")>0) {
				itemhtml ="<div fileUrl='"+strJson[i]
				+"'><i class='icon iconfont icon-tupian je-blue'></i><span data-locale='popup-file-image' class='je-g0'>"+
				"图片"+"</span></div>";
			}else{
				itemhtml ="<div fileUrl='"+rootPath[i]
				+"'><i class='icon iconfont icon-a-23Ecipan je-g9'></i><span class='je-g0'>"+
				rootPath[i]+"</span></div>";
			}
			$("div.file-content-left").append(itemhtml); 
		}
		$("div.file-content-left>div").click(function(){
			$("input#filePathShow").val($(this).attr("fileUrl"));
			$("input#filePathShow").change();
		});
	}
	/**
	 * 
	 * @param {Array} filePaths   文件夹数组
	 * @param {Array} files       文件数组
	 * @param {Boolean} isAddFile 是否更新加载文件到界面
	 */
	function updateFilePath(filePaths,files,isAddFile){
		console.log(filePaths)
		console.log(files)
		//加载文件夹
		$("div.file-content-right").html("");
		var itemhtml ="";
		for (var i = 0; i < filePaths.length; i++) {
			itemhtml ="<div fileUrl='"+filePaths[i]
				+"'><i class='icon iconfont icon-wenjianjia je-yellow'></i><span>"+
				filePaths[i]+"</span></div>";
			$("div.file-content-right").append(itemhtml);
		}
		//加载文件
		if(isAddFile){
			for (var i = 0; i < files.length; i++) {
				var iconClass ="";
				if(files[i].lastIndexOf(".txt")>0){
					iconClass = "icon-Txt je-blue";
				}else if(files[i].lastIndexOf(".hdr")>0){
					iconClass = "icon-hdr je-blue";
				}else if(files[i].lastIndexOf(".raw")>0){
					iconClass = "icon-raw je-blue";
				}else if(files[i].lastIndexOf(".csv")>0){
					iconClass = "icon-csv je-green";
				}else if(files[i].lastIndexOf(".png")>0){
					iconClass = "icon-tupian je-blue";
				}else if(files[i].lastIndexOf(".jpg")>0){
					iconClass = "icon-tupain je-blue";
				}else{
					iconClass = "icon-shiyongwendang je-blue";
				}
				itemhtml ="<div fileUrl='"+files[i]
					+"'><i class='icon iconfont "+iconClass+"'></i><span>"+
					files[i]+"</span></div>";
				$("div.file-content-right").append(itemhtml);
			}
		}
		$("div.file-content-right>div").dblclick(function(){
			if ($(this).children("i").hasClass("icon-wenjianjia")) {
				$("input#filePathShow").val($("input#filePathShow").val()+$(this).attr("fileUrl")+"\\");
				$("input#filePathShow").change();
			}
		});
		
		$("div.file-content-right>div").on("mousedown",function(e){
			if (e.button==0) {	
				isDown = true;
				nStart = $(this).index("div.file-content-right>div");
			}
		});
		$("div.file-content-right>div").on("mousemove",function(e){
			if (e.button==0) {	
				if (!isDown) return;
				if (!isBool) {
					nEnd = $(this).index("div.file-content-right>div");
					$("div.file-content-right>div.je-blue").removeClass("je-blue");
					if (nStart>nEnd) {
						for (var i = nStart; i >= nEnd;i-- ) {
							var dom = $("div.file-content-right>div").get(i);
							if (!$(dom).children("i").hasClass("icon-wenjianjia")) {
								$(dom).addClass("je-blue");
							}
						}
					} else{
						for (var i = nStart; i <= nEnd;i++ ) {
							var dom = $("div.file-content-right>div").get(i);
							if (!$(dom).children("i").hasClass("icon-wenjianjia")) {
								$(dom).addClass("je-blue");
							}
						}
					}
					var selectItem = new Array();
					for (var i = 0; i < $("div.file-content-right>div.je-blue").length; i++) {
						var dom = $("div.file-content-right>div.je-blue").get(i);
						selectItem.push($(dom).attr("fileUrl"));
					}
					$("div.fileName input").val(selectItem.join());
				}
				
				
			}
		});
		$("div.file-content-right>div").on("mouseup",function(e){
			if (e.button==0) {
				isDown = false;
				if (!isBool){
					if (nStart==$(this).index("div.file-content-right>div")) {
						
						$(this).siblings().removeClass("je-blue");
						if (!$(this).children("i").hasClass("icon-wenjianjia")) {
							$(this).addClass("je-blue");
						}
						var fileUrl = $(this).attr("fileUrl");
						$("div.fileName input").val($(this).attr("fileUrl"));
					}
					
				}else{
					if ($(this).hasClass("je-blue")) {
						$(this).removeClass("je-blue");
					} else{
						$(this).addClass("je-blue");
					}
					var selectItem = new Array();
					for (var i = 0; i < $("div.file-content-right>div.je-blue").length; i++) {
						var dom = $("div.file-content-right>div.je-blue").get(i);
						selectItem.push($(dom).attr("fileUrl"));
					}
					$("div.fileName input").val(selectItem.join());
				}
				
			}
		});
	}


	$("input#filePathShow").change(function(){
		let fileUrl = this.value;
		let fileType = [];
		$(".je-select option").each(function () {
			if ($(this).css('display') !== 'none') {
				let idx = $(this).val().indexOf('.');
				let temp = $(this).val().substring(idx + 1);
				fileType.push(temp)
				if(temp === 'hdr') fileType.push('raw')
			}
		})
		//获取文件夹
//-----------------------------------------------------------------------------
		websocket.send(funcCode.GetDirsFiles,{path:fileUrl,suffix:fileType},false)
        main.setCallbacks(funcCode.GetDirsFiles,rev=>{
        	updateFilePath(rev.getDirsList(),rev.getFilesList(),false);
//      	var data = JSON.parse(rev.getTiptitle());
//			updateFilePath(data.Dirs,data.files,true);
			
		})
	});

	$("div#saveFilePath").get(0).oncontextmenu=function(event){
		event.preventDefault();	
	}
	$("div.file-content-right").on("mousedown",function(e){
		if (e.button==2) {
			$("div.file-hide").removeClass("je-hide");
		}else{
			$("div.file-show-iteam").addClass("je-hide");
		}
	});
	
	$("div.file-hide").on("mouseup",function(e){
		if (e.button==2) {
			$("div.file-show-iteam").removeClass("je-hide");
			console.log(e);
			$("div.file-show-iteam").css("top",e.offsetY);
			$("div.file-show-iteam").css("left",e.offsetX);
			event.stopPropagation();
		}else{
			$("div.file-show-iteam").addClass("je-hide");
		}
		$("div.file-hide").addClass("je-hide");
	});
	$("div.file-title>button").click(function(event){
		var indexButton = $(this).index("div.file-title>button");
		switch (indexButton){
			case 0:
				var filePathName = $("input#filePathShow").val();
				filePathName = filePathName.substr(0,filePathName.length-1);
				if (filePathName.lastIndexOf("\\")>=0) {
					filePathName = filePathName.substring(0,filePathName.lastIndexOf("\\")+1);
					$("input#filePathShow").val(filePathName);
				}
				
				break;
			case 1:
				$($("div.file-content-left>div").get(0)).click();
				break;
		}
		$("input#filePathShow").change();
		event.stopPropagation();
	});
	$("div.file-show-iteam>div").click(function(){
		$("div.file-show-iteam").addClass("je-hide");
		switch ($(this).html()){
			case "新建文件夹":
				var itemhtml ="<div fileUrl='新建文件夹'>"+
				"<i class='icon iconfont icon-wenjianjia je-yellow'></i>"+
				"<input class='je-ga' value='新建文件夹'/></div>";
				$(itemhtml).appendTo("div.file-content-right");
				$(itemhtml)
				$("div.file-content-right input").change(function(){
					var fileName = $(this).val();
					$(this).parent().append("<span>"+fileName+"</span>");
					$(this).parent().attr("fileUrl",fileName);
					$(this).parent().dblclick(function(){
						if ($(this).children("i").hasClass("icon-wenjianjia")) {
							$("input#filePathShow").val($("input#filePathShow").val()+$(this).attr("fileUrl")+"\\");
							$("input#filePathShow").change();
						}
					});
					$(this).detach();
					//新建文件夹
					var filePath = $("input#filePathShow").val()+fileName;
					console.log(filePath);
//--------------------------------------------------------------------------------------------------------------					
					websocket.send(funcCode.MakeDir,{path:filePath},false);
					main.setCallbacks(funcCode.MakeDir,rev=>{
						console.log(rev.getBstatus());
			        })
					
				});
				break;
			case "全选":
				$("div.file-content-right>div").addClass("je-blue");
				$("i.icon-wenjianjia").parent().removeClass("je-blue");
				var selectItem = new Array();
				for (var i = 0; i < $("div.file-content-right>div.je-blue").length; i++) {
					var dom = $("div.file-content-right>div.je-blue").get(i);
					selectItem.push($(dom).attr("fileUrl"));
				}
				$("div.fileName input").val(selectItem.join());
				break;
		}
	});
	$("div.btSaveFile>button").click(function(){
		if ($(this).index("div.btSaveFile>button")==0) {
			let filepath = $("input#filePathShow").val();
			if (filepath.indexOf(':') < 0) return  jeBox.msg($.i18n.prop('tips-openFilepath'),{icon:1})
			main.openFilePath = filepath
			main.isOpenChecked = true;
		}
		//关闭窗口
		$(this).parents("div.jeBox-anim").find("a.jeBox-close").click();
	});
</script>
