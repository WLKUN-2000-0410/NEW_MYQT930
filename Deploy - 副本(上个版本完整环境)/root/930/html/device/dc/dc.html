<style>
    #dcSet{
        width: 100%;
        height: 100%;
        display: inline-flex;
        flex-direction: column;
        border: 3px ridge #555555;
    }
    #dcSet> div{
        height: 10%;
        border-top: 3px ridge #555555;
        display: inline-flex;
        align-items: center;
    }
    #dcSet p{
        margin-left: 2%;
    }
    #dcSet div span{
        width: 15%;
    }
    #dcSet div select{
        width: 150px;
    }
    #dcSet div input[type=text]{
        width: 100px;
    }
    #dcSet div button{
        margin-left: 10px;
    }
    .cursor:hover {
        cursor: crosshair;
    }
    #dcShow>div{
    	width: 100%;
    	height: 100%;
    	position: relative;
    }
    #dcShow img{
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        cursor: crosshair;
    }
    #dcShow div.lined{
    	display: inline-block;
    	width: 0;
    	height: 99%;
    	border-left: 1px solid red;
    	position: absolute;
    	left: 20%;
    	top: 0;
    }
    #dcShow div.rowed{
    	display: inline-block;
    	width: 99%;
    	height: 0;
    	border-top: 1px solid red;
    	position: absolute;
    	top: 20%;
    	right: 0;
    }
</style>
<div id="dcSet">
    <div style="height: 60%;align-items: flex-start;;overflow: auto;border: 0" id="dcShow">
        <!--ondblclick="movie.m_dbclick(event)"-->
		<div class="je-dib" onclick="movie.div_click(this,event)">
			<img src="source/image/dc/dc.jpg" alt=" " id="dcImg" onmousemove="movie.m_mousemove(event)" ondblclick="movie.m_dbclick(event)" onmousewheel="movie.m_mousewheel(event)" >
			<div class="lined"></div>
			<div class="rowed"></div>
		</div>
    </div>
    <div >
        <span data-locale="popup-device-dc-gain">增益:</span>
        <select id="dcGain" onchange="dc.setGain()"></select>
        <p>
            <span data-locale="popup-device-dc-readOut">读取速率:</span>
            <select id="dcReadSpeed" style="width: 130px;" onchange="dc.setSpeed(0)"></select>
        </p>
        <p>
            <span data-locale="popup-device-dc-moveSpeed">转移速率:</span>
            <select id="dcShiftSpeed" style="width: 130px;" onchange="dc.setSpeed(1)"></select>
        </p>

    </div>
    <div>
        <span data-locale="popup-device-dc-mode">模式:</span>
        <select id="dcMode" onchange="dc.setScanMOde()">
            <option>FVB</option>
            <option>Bin</option>
        </select>
        <span data-locale="popup-device-dc-intercept">截取:</span>
        <input type="text" id="dcBinMin" onkeyup="this.value=this.value.replace(/[^0-9\-]/g,'')">
        <span style="width: 5%;">-</span>
        <input type="text" id="dcBinMax" onkeyup="this.value=this.value.replace(/[^0-9\-]/g,'')">
        <button type="button" class="btn btn-secondary btn-sm" id="dcBinBtn" data-locale="popup-confirm" onclick="dc.setBinRange()">确定</button>
    </div>
    <div>
        <span data-locale="popup-device-dc-expTime" >积分时间:</span>
        <input type="text" id="dcExpTime" value="0.3" onchange="dc.setExpTime()">
        <button type="button" class="btn btn-success btn-sm" data-locale="popup-device-dc-startBtn" id="startMovie" onclick="dc.startMovie()">开始影像</button>
        <button type="button" class="btn btn-danger btn-sm" data-locale="popup-device-dc-stopBtn" id="stopMovie" onclick="dc.stopMovie()" disabled>停止影像</button>
        <button type="button" class="btn btn-secondary btn-sm" data-locale="popup-device-dc-saveImg" id="saveImg" onclick="dc.saveDataOrImg(1)">保存图片</button>
        <button type="button" class="btn btn-secondary btn-sm" data-locale="popup-device-dc-saveData" id="saveData" onclick="dc.saveDataOrImg(0)">保存数据</button>
        <button type="button" class="btn btn-secondary btn-sm" data-locale="popup-device-dc-adv" id="dcAdvBtn" onclick="main.ask_password(()=>showDcAdv())">高级设置</button>
    </div>
    <div id="coords" style="pointer-events: none;justify-content: center;font-size: 20px" >
<!--        <input type="checkbox" class="custom-checkbox" id="dcCursor" style="margin-left: 20px">-->
<!--        <span style="width: 10%">十字光标</span>-->
<!--        <span style="width: 5%">X:</span>-->
<!--        <input type="text" id="dcX" disabled>-->
<!--        <span style="width: 5%">Y:</span>-->
<!--        <input type="text" id="dcY" disabled>-->
    </div>
</div>
<script>
    $.getScript("js/control/dc/dc.js",()=>{dc.initDC()})
    $.getScript('js/utils/movie.js',()=>{movie.initMovie('dcImg','dcShow')})
    function  showDcAdv() {
        $.get("html/device/dc/dcAdv.html?"+new Date().getTime(), function (str) {
            jeBox.open({
                title: [" ", {
                    'text-align': 'center',
                    'font-size': '1.5em'
                }],
                type: 'dialog',
                maskLock: true, //是否遮罩
                maskClose: false,
                isDrag: true,
                shadow: true,
                closeBtn: true,
                boxSize: [1200, 600],
                zIndex: 1,
                content: str,
                success: function () {
                    main.translate(undefined)
                }
            })
        })
    }
    $("#dcBinMin").change(function () {
        let min = parseInt($(this).val())
        if(isNaN(min)) return jeBox.msg($.i18n.prop('tips-scan-paramNAN'),{icon:1})
        if(min>264) {
            $(this).val('')
            return jeBox.msg($.i18n.prop('tips-dc-binRange') + 264, {icon: 1})
        }
    })
    $("#dcBinMax").change(function () {
        let max = parseInt($(this).val())
        if(isNaN(max)) return jeBox.msg($.i18n.prop('tips-scan-paramNAN'),{icon:1})
        if(max>264) {
            $(this).val('')
            return jeBox.msg($.i18n.prop('tips-dc-binRange')+264,{icon:1})
        }
    })
</script>
