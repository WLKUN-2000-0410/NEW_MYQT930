<script>
  	$.getScript("js/control/DT/dt.js")

		camera.initCamera(device.camera.type)
  	})
    $("#cps p input[type=range]").change(function () {
        let value = $(this).val();
        $(this).prev('input').val(value)
    })
	$("button#cameraOpenLaser").click(function(){
		let isBg = $(this).hasClass("je-bg-red");
		if (isBg) {
			$(this).removeClass("je-bg-red");
		}else{
			$(this).addClass("je-bg-red");
		}
		let EW = $("#steadyEW").length===1?$("#steadyEW").val():$("#waveEW").val()
        let power = isBg? "归零":"0.1"
        fConfig.excwave = EW
        fConfig.powervalue = power
        websocket.send(funcCode.pS,{"excWave":EW,"powerValue":power})
	});

</script>
