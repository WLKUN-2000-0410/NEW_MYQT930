<script>
    $(function () {
           websocket.send(funcCode.SpecGetVersion,{})
            main.setCallbacks(funcCode.SpecGetVersion,rev=>{
                let sn = rev.getVersion()
                let idx = sn.indexOf('V')
                let ver = Number(sn.slice(idx+1,sn.length)).toFixed(1)
                $("#specVer").text(sn)
                $(".GRATBLAZE1").prop('disabled',ver<3.4)
                $(".GRATBLAZE2").prop('disabled',ver<3.4)
                $(".GRATBLAZE3").prop('disabled',ver<3.4)
            })
    })
    function readFile() {
        $("#readFile").click();
        $('input#readFile').change(function () {
            let file = this.files[0];
            if (this.files.length > 0) {
                let reader = new FileReader(); //new一个FileReader实例
                reader.onload = function () {
                    let strFileC = this.result;
                    let strArrays = strFileC.split("\r\n");
                    for (let i = 0; i < strArrays.length; i++) {
                        let index= strArrays[i].indexOf("=");
                        if (index>=0) {
                            let strKey= strArrays[i].substring(0,index);
                            let strValue = strArrays[i].substr(index+1);
                            $("input."+strKey).val(strValue);
                        }
                    }
                };
                reader.readAsText(file);
            }
            $("input#readFile").val('');

        });
    }
    function readDeviceParam() {
        let grating = fConfig.funnm===0?$("#steadyGrating").get(0).selectedIndex+1:$("#waveGrating").get(0).selectedIndex+1
        websocket.send(funcCode.SpecGetParams,{grating:grating})
        main.setCallbacks(funcCode.SpecGetParams,rev=>{
            let idx = grating
            $(".FOCLEN").val(rev.getFoclen())
            $(".ANGDEV").val(rev.getAngdev())
            $(".FOCTLT").val(rev.getFoctlt())
            $(".POLY1").val(rev.getPoly1())
            $(".POLY2").val(rev.getPoly2())
            $(".POLY3").val(rev.getPoly3())
            $(".POLY4").val(rev.getPoly4())
            $(".POLY5").val(rev.getPoly5())
            $(".SINAMPLITUDE").val(rev.getSinamplitude())
            $(".SINPHASE").val(rev.getSinphase())
            $(".SINFREQUENCY").val(rev.getSinfrequency())
            $(".GRATSTART"+idx).val(rev.getGratstart())
            $(".GRATOFFSET"+idx).val(rev.getGratoffset())
            $(".GRATLINES"+idx).val(rev.getGratlines())
            $(".GRATBLAZE"+idx).val(rev.getGratblaze())
            $(".DETECTOROFFSET1").val(rev.getDetectoroffset1())
            $(".DETECTOROFFSET2").val(rev.getDetectoroffset2())
        })
    }
    function setDeviceParam() {
        let grating = fConfig.funnm===0?$("#steadyGrating").get(0).selectedIndex:$("#waveGrating").get(0).selectedIndex
        let [data,idx] = [{},(grating+1)]
        data.FOCLEN = Number($(".FOCLEN").val())
        data.ANGDEV = Number($(".ANGDEV").val())
        data.FOCTLT = Number($(".FOCTLT").val())
        data.POLY1 = $(".POLY1").val()
        data.POLY2 = $(".POLY2").val()
        data.POLY3 = $(".POLY3").val()
        data.POLY4 = $(".POLY4").val()
        data.POLY5 = $(".POLY5").val()
        data.SINAMPLITUDE = Number($(".SINAMPLITUDE").val())
        data.SINPHASE = Number($(".SINPHASE").val())
        data.SINFREQUENCY = Number($(".SINFREQUENCY").val())
        data.DETECTOROFFSET1 = Number($(".DETECTOROFFSET1").val())
        data.DETECTOROFFSET2 = Number($(".DETECTOROFFSET2").val())
        data.grating = idx
        data.GRATSTART = Number($(".GRATSTART"+idx).val())
        data.GRATOFFSET = Number($(".GRATOFFSET"+idx).val())
        data.GRATLINES = Number($(".GRATLINES"+idx).val())
        data.GRATBLAZE = Number($(".GRATBLAZE"+idx).val())

        websocket.send(funcCode.SpecSetParams,data)
    }
    function exportFile() {
        let strPrams="[General]"+"\r\n"+
            "FOCLEN="+$("input.FOCLEN").val()+"\r\n"+
            "ANGDEV="+$("input.ANGDEV").val()+"\r\n"+
            "FOCTLT="+$("input.FOCTLT").val()+"\r\n"+
            "IDSTRING=Andor Technology"+"\r\n"+
            "SVERNO=2.1"+"\r\n"+
            "IVERNO="+''+"\r\n"+
            "DOM=02/08/2007"+"\r\n"+
            "DATE=28/03/2022"+"\r\n"+
            "[Wavelength]"+"\r\n"+
            "POLY1="+$("input.POLY1").val()+"\r\n"+
            "POLY2="+$("input.POLY2").val()+"\r\n"+
            "POLY3="+$("input.POLY3").val()+"\r\n"+
            "POLY4="+$("input.POLY4").val()+"\r\n"+
            "POLY5="+$("input.POLY5").val()+"\r\n"+
            "SINAMPLITUDE="+$("input.SINAMPLITUDE").val()+"\r\n"+
            "SINPHASE="+$("input.SINPHASE").val()+"\r\n"+
            "SINFREQUENCY="+$("input.SINFREQUENCY").val()+"\r\n"+
            "ENABLECALIBRATION=1"+"\r\n"+
            "CURRENTWAVELENGTH=0"+"\r\n"+
            "DETECTOROFFSET1="+$("input.DETECTOROFFSET1").val()+"\r\n"+
            "DETECTOROFFSET2="+$("input.DETECTOROFFSET2").val()+"\r\n"+
            "NOOFTURRETS=1"+"\r\n"+
            "ACTIVETURRET=0"+"\r\n"+
            "GRATSTART1="+$("input.GRATBLAZE1").val()+"\r\n"+
            "GRATOFFSET1="+$("input.GRATOFFSET1").val()+"\r\n"+
            "GRATLINES1="+$("input.GRATLINES1").val()+"\r\n"+
            "GRATBLAZE1="+$("input.GRATBLAZE1").val()+"\r\n"+
            "GRATSTART2="+$("input.GRATSTART2").val()+"\r\n"+
            "GRATOFFSET2="+$("input.GRATOFFSET2").val()+"\r\n"+
            "GRATLINES2="+$("input.GRATLINES2").val()+"\r\n"+
            "GRATBLAZE2="+$("input.GRATBLAZE2").val()+"\r\n"+
            "GRATSTART3="+$("input.GRATSTART3").val()+"\r\n"+
            "GRATOFFSET3="+$("input.GRATOFFSET3").val()+"\r\n"+
            "GRATLINES3="+$("input.GRATLINES3").val()+"\r\n"+
            "GRATBLAZE3="+$("input.GRATBLAZE3").val()+"\r\n"+
            "NOOFGRATINGS=3"+"\r\n"+
            "[Filter]"+"\r\n"+
            "FILTERSTRINGS1=Filter 1"+"\r\n"+
            "FILTERSTRINGS2=Filter 2"+"\r\n"+
            "FILTERSTRINGS3=Filter 3"+"\r\n"+
            "FILTERSTRINGS4=Filter 4"+"\r\n"+
            "FILTERSTRINGS5=Filter 5"+"\r\n"+
            "FILTERSTRINGS6=Filter 6";
        download(new Blob([strPrams]),'factor.bck', 'text/plain')
    }
</script>
