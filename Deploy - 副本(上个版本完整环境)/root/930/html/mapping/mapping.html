<script src="source/lib/threeJS/three.js"></script>
<script>
    $.getScript('js/mapping/mapping.js', () => {
    	mapping.initMapping();
    })
    //长度监听事件
    function updateWaveParam(dom){
        let lines = mapping.mappingChart.active_series()
        if(lines.length>0){
            let cur = parseFloat($(dom).val())
            let min = lines[0].min_x().toFixed(2),max=lines[0].max_x().toFixed(2)
            if((cur < min)||(cur > max)){
                $(dom).val('')
                return  jeBox.msg($.i18n.prop('tips-range-seMsg')+min+"~"+max,{icon:1});
            }
        }else {
            let unit= $("#mUnit").text()
            let dw = inputRange.isOutRange($(dom),function (dom,old,cur,min,max) {
                if ((cur < min)||(cur > max)) {
                    jeBox.msg($.i18n.prop('tips-range-seMsg')+min+"~"+max,{icon:1})
                    dom.val(old)
                    return false
                }
                return true
            },(unit==="cm-1"))
            if(dw===undefined) return
            if(fConfig.waveunit==="cm-1"){
                let gratingNum = 0;
                if($("#steadyGrating").length===1){
                    gratingNum =$("#steadyGrating").get(0).selectedIndex+1;
                }else{
                    gratingNum =$("#waveGrating").get(0).selectedIndex+1;
                }
                let dLaserWave = 0.0;
                if (fConfig.excwave==="空"||gratingNum===0) {
                    dLaserWave=fConfig.excwaveselect[0].E;
                } else{
                    fConfig.excwaveselect.forEach((cur)=>{
                        if(cur.name === fConfig.excwave){
                            dLaserWave=cur["grating"+gratingNum];
                        }
                    })
                }
                if($(dom).attr("id")==="mCenWave"){
                    $('#dWave0').val($(dom).val());
                    $('#dWave1').val($(dom).val());
                    $('#dWave2').val($(dom).val());
                }
                let sendParam = {};
                sendParam.laserWave = dLaserWave;
                sendParam.array = [Number($(dom).val())];
                websocket.send(funcCode.CmToNmParams,sendParam);
                main.setCallbacks(funcCode.CmToNmParams,rev =>{
                    let selectW = rev.getPdList();
                    $(dom).attr("nm",selectW[0].toFixed(4));
                    if($(dom).attr("id")==="mCenWave"){
                        $('#dWave0').attr("nm",selectW[0].toFixed(4));
                        $('#dWave1').attr("nm",selectW[0].toFixed(4));
                        $('#dWave2').attr("nm",selectW[0].toFixed(4));
                    }
                })
            }else{
                $(dom).attr("nm",Number($(dom).val()));
                if($(dom).attr("id")==="mCenWave"){
                    $('#dWave0').val($(dom).val());
                    $('#dWave1').val($(dom).val());
                    $('#dWave2').val($(dom).val());
                    $('#dWave0').attr("nm",$(dom).val());
                    $('#dWave1').attr("nm",$(dom).val());
                    $('#dWave2').attr("nm",$(dom).val());
                }
            }
        }
        
    }
    
	$("#mXCheckbox").change(function(){
    	if(this.checked){
    		$("#mXL").removeAttr("disabled");
    		$("#mXStep").removeAttr("disabled");
    	}else{
    		$("#mXL").attr("disabled","disabled");
    		$("#mXStep").attr("disabled","disabled");
    	}
    	mapping.dimensions=$("#mXCheckbox").get(0).checked&&$("#mYCheckbox").get(0).checked&&$("#mZCheckbox").get(0).checked;
    	mapping.switchDimensions();
    });
    $("#mYCheckbox").change(function(){
    	if(this.checked){
    		$("#mYL").removeAttr("disabled");
    		$("#mYStep").removeAttr("disabled");
    	}else{
    		$("#mYL").attr("disabled","disabled");
    		$("#mYStep").attr("disabled","disabled");
    	}
    	mapping.dimensions=$("#mXCheckbox").get(0).checked&&$("#mYCheckbox").get(0).checked&&$("#mZCheckbox").get(0).checked;
    	mapping.switchDimensions();
    });
    $("#mZCheckbox").change(function(){
    	if(this.checked){
    		$("#mZL").removeAttr("disabled");
    		$("#mZStep").removeAttr("disabled");
    	}else{
    		$("#mZL").attr("disabled","disabled");
    		$("#mZStep").attr("disabled","disabled");
    	}
    	mapping.dimensions=$("#mXCheckbox").get(0).checked&&$("#mYCheckbox").get(0).checked&&$("#mZCheckbox").get(0).checked;
    	mapping.switchDimensions();
    });
    
    $('#dWave1').change(function(){
    	updateWaveParam(this);
    });
	$('#dWave0').change(function(){
		updateWaveParam(this);
	});
	$('#dWave2').change(function(){
	    let dw0 = Number($("#dWave0").val())
        let dw2 = Number($(this).val())
	    if(dw0>dw2){
	        jeBox.msg($.i18n.prop('tips-range-seMsg1'),{icon:1})
            let oldDw0 = $("#dWave0").attr("oldData")
            let oldDw2 = $(this).attr("oldData")
            $("#dWave0").val(oldDw0)
            $(this).val(oldDw2)
            return
        }
		updateWaveParam(this);
	});
    $("#mXL").change(function () {
        if(mapping.dimensions) return
        if($("#mappingImg").prop('hidden')){
            let mXL = parseFloat($("#mXL").val()) //当前框长度um
            let mXC = parseFloat($("#mXCp").val())
            let min = mXC-mXL/2,max = mXC+mXL/2
            if(min<0||max>75000) jeBox.msg($.i18n.prop('tips-range-seMsg')+0+'~'+75000,{icon:1})
            return;
        }
        let imgW = $("#mappingImage").width()
        if(typeof camera === 'undefined') return;
        fConfig.lensConf.forEach(cur=>{
            if (camera.lenName === cur.name) {
                let mXL = $("#mXL").val() //当前框长度um
                let w = mXL*cur.scale
                let boxL = $("#mappingBox").position().left
                let boxW = $("#mappingBox").get(0).offsetWidth
                let left = boxL-(w-boxW)/2.0

                if(left<0||(left+w)>imgW){
                	$("#mXL").val(mapping.xW)
                    return jeBox.msg($.i18n.prop('tips-mapping-imgW'),{icon:1})
                }
				mapping.xW = mXL
                $("#mappingBox").css({left:left,width:w})
            }
        })
    })
    $("#mYL").change(function () {
        if(mapping.dimensions) return

        if($("#mappingImg").prop('hidden')){
            let mYL = parseFloat($("#mYL").val()) //当前框长度um
            let mYC = parseFloat($("#mYCp").val())
            let min = mYC-mYL/2,max = mYC+mYL/2
            if(min<0||max>75000) jeBox.msg($.i18n.prop('tips-range-seMsg')+0+'~'+50000,{icon:1})
            return;
        }
        let imgH = $("#mappingImage").height()
        if(typeof camera === 'undefined') return;
        fConfig.lensConf.forEach(cur=>{
            if (camera.lenName === cur.name) {
                let mYL = $("#mYL").val() //当前框长度um
                let h = mYL*cur.scale
                let boxT = $("#mappingBox").position().top
                let boxH = $("#mappingBox").get(0).offsetHeight
                let top = boxT-(h-boxH)/2.0

                if(imgH<(h+top)||top<0) {
                    $("#mYL").val(mapping.yH)
                    return jeBox.msg($.i18n.prop('tips-mapping-imgH'), {icon: 1})
                }
                $('#mappingBox').css({top:top,height:h})
                mapping.yH = mYL
            }
        })
    })
    //中心点监听事件
    $("#mXCp").change(function () {
        if(mapping.dimensions) return
    	let imgW = $("#mappingImage").width()
    	if(typeof camera === 'undefined') return;
        fConfig.lensConf.forEach(cur=>{
            if (camera.lenName === cur.name) {
                let mXL =Number($("#mXL").val())  //当前框长度um
                let xc = Number($("#mXCp").val())
                let dv = (mapping.xC-xc)*cur.scale
                let boxL = $("#mappingBox").position().left
                let boxW = $("#mappingBox").get(0).offsetWidth
                let left = boxL -  dv*device.camera.mirrorPos

                if(left<0||(left+boxW)>imgW){
                    jeBox.msg($.i18n.prop('tips-mapping-outImgRange'),{icon:1})
                    return
                }
                $('#mappingBox').css("left",left)
                draws.boxL = left
                mapping.xC = xc

            }
        })
    })
    $("#mYCp").change(function () {
        if(mapping.dimensions) return
        let imgH = $("#mappingImage").height()
        if(typeof camera === 'undefined') return;
        fConfig.lensConf.forEach(cur=>{
            if (camera.lenName === cur.name) {
                let mYL =Number($("#mYL").val())  //当前框长度um
                let yc = Number($("#mYCp").val()) //当前中心点 μm
                let dv = (mapping.yC - yc)*cur.scale
                let boxT = $("#mappingBox").position().top
                let boxH = $("#mappingBox").get(0).offsetHeight
                let top = boxT - dv*(-1.0)
                if(top<0||(top+boxH)>imgH){
                    jeBox.msg($.i18n.prop('tips-mapping-outImgRange'),{icon:1})
                    return
                }
                $('#mappingBox').css("top",top)
                draws.boxT = top
                mapping.yC = yc

            }
        })
    })

    //范围限制
    $("#mCenWave").change(function () {
        let unit= $("#mUnit").text()
        let cw = inputRange.isOutRange($(this),function (dom,old,cur,min,max) {
            if ((cur < min)||(cur > max)) {
                jeBox.msg($.i18n.prop('tips-range-centerWaveMsg')+min+"~"+max,{icon:1})
                dom.val(old)
                return false

            }
            return true
        },(unit==="cm-1"))
        if(cw===undefined) return
        updateWaveParam(this);
    })
    $("#mSlit").change(function () {
         inputRange.isOutRange($(this),function (dom,old,cur,min,max) {
            if ((cur < min)||(cur > max)) {
                jeBox.msg($.i18n.prop('tips-range-slitMsg1')+min+"~"+max,{icon:1})
                dom.val(old)
                return false
            }
            if(cur%10!==0){
                jeBox.msg($.i18n.prop('tips-range-slitMsg2'),{icon:1})
                dom.val(old)
                return false
            }
            return true
        },false)
    })
    $("#mCoordsX").change(function () {
        inputRange.isOutRange($(this),function (dom,old,cur,min,max) {
            if ((cur < min)||(cur > max)) {
                jeBox.msg($.i18n.prop('tips-mapping-range')+min+"~"+max,{icon:1})
                dom.val(old)
                return false
            }
            return true
        },false)
    })
    $("#mCoordsY").change(function () {
        inputRange.isOutRange($(this),function (dom,old,cur,min,max) {
            if ((cur < min)||(cur > max)) {
                jeBox.msg($.i18n.prop('tips-mapping-range')+min+"~"+max,{icon:1})
                dom.val(old)
                return false
            }
            return true
