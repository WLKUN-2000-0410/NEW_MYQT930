<style>
    #dbCalcAdvDiv {
        width: 100%;
        height: 100%;
        display: inline-flex;
        flex-direction: column;
    }

    #dbCalcAdvDiv div {
        width: 100%;
        height: 12%;
        display: inline-flex;
        flex-direction: column;
    }

    #dbCalcAdvDiv div b {
        display: inline-flex;
    }

    #dbCalcAdvDiv div p {
        display: inline-flex;
        align-items: center;
    }

    #dbCalcAdvDiv div p span {
        width: 15%;
        text-align: right;
        margin-right: 10px;
    }

    #dbCalcAdvDiv div p input {
        width: 40%;
    }
</style>
<div id="dbCalcAdvDiv">
    <div style="border-bottom: 3px ridge #555555">
        <b data-locale="popup-db-add-title1">一、测试基本信息</b>
        <p>
            <span >ID</span>
            <input type="text" style="width: 10%" class="text-truncate" id="dbCalcAdvID" disabled>
            <span data-locale="popup-db-table-name">名称</span>
            <input type="text" id="dbCalcAdvName" class="text-truncate" disabled>
            <span data-locale="popup-db-table-mr">对比度</span>
            <input type="text" id="dbCalcAdvMD" class="w-25" disabled>
        </p>
    </div>
    <div style="height: 76%">
        <b data-locale="popup-db-add-title1">二、谱图</b>
        <p style="height: 94%;border: 3px ridge #555555" id="dbCalcAdvChart"></p>
    </div>
    <div>
        <b data-locale="popup-db-add-title1">三、测试方法</b>
        <p class="w-75">
            <span data-locale="popup-db-add-power">功率</span>
            <input type="text" id="dbCalcAdvPower" class="w-25" disabled>
          <!--  <span>积分次数</span>
            <input type="text" disabled>-->
            <span data-locale="popup-db-add-expTime">积分时间</span>
            <input type="text" id="dbCalcAdvExpTime" class="w-25" disabled>
     <!--       <span>积分间隔</span>
            <input type="text" disabled>-->
        </p>
    </div>
</div>
<script>
    function initDbAdv(msg,chart) {
        main.translate()
        $('#dbCalcAdvID').val(msg.id).attr('title',msg.id)
        $('#dbCalcAdvName').val(msg.name).attr('title',msg.name)
        $('#dbCalcAdvMD').val(msg.md)
        $("#dbCalcAdvPower").val(msg.powervalue)
        $("#dbCalcAdvExpTime").val(msg.ExpTime)
        let orgX = chart.active_series()[0].get_data().x
        let orgY= chart.active_series()[0].get_data().y
        let dbAdvChart = new chart_xy('dbCalcAdvChart')
        let orgLine = dbAdvChart.add_series('original',0)
        orgLine.add_array(orgX,orgY)
        orgLine.set_color("#ff4757")
        let comLine = dbAdvChart.add_series('comparison',0)
        comLine.add_array(msg.xPd,msg.yPd)
        comLine.set_color("#2ed573")
        dbAdvChart.legend_box().set_visible(true)
    }
</script>
