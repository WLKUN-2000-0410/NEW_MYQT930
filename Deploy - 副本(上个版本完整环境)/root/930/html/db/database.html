    function getDbDataType() {
        $('#dbDataType').empty()
        if(dbType ===0){
            websocket.send(funcCode.getSampleTypess,{},false)
            main.setCallbacks(funcCode.getSampleTypess,rev=>{
                let lg = localStorage.getItem("lg")
                let result = JSON.parse(rev.getStrsampletype())
                console.log(result)
                let TList = []
                for (let i = 0; i <result.length ; i++) {
                    let temp = {id:result[i]['classType'],name:result[i][lg]}
                    TList.push(temp)
                }
                dbDataType.render({
                    elem: "#dbDataType",
                    data: TList,
                    init_value: [TList[0].id],
                    width:'250px',
                    height:'28px',
                    body_height: 300,
                    checkbox: true,
                    name: "test",
                    search_text: $.i18n.prop('popup-db-type-searchTxt'),//搜索框提示文字
                    empty_search: $.i18n.prop('popup-db-type-emptyTxt'),//空数据提示文字
                    placeholder: $.i18n.prop('popup-db-type-placeholder'),//默认显示文字
                    btn: [{name:$.i18n.prop('legend-btn-selectAll'),icon:"verJsFont verJsFont-quanxuan",callfun:"changeAll"},{name:$.i18n.prop('legend-btn-inverse'),icon:"verJsFont verJsFont-tubiaozhizuomoban",callfun:"rechangeAll"},{name:$.i18n.prop('popup-db-type-empty'),icon:"verJsFont verJsFont-cancel",callfun:"clearChange"}]

    function showDbAdv(e,index) {
        let flag = e.base.templateId === "calcTable"
        let msg = e.getRow(index)
        let url = flag?"html/db/dbCalcAdv.html?":"html/db/dbAdv.html?"
        let chart = flag?calcChart:''
        let title =$.i18n.prop('popup-db-view-title'+(flag?2:1))
        let data = {}
        data.dbMode = flag?calcDbType:dbType
        data.id = parseInt(msg.id)
        websocket.send(funcCode.DBView_Show,data)
        main.setCallbacks(funcCode.DBView_Show,rev=>{
            msg.powervalue = rev.getPowervalue()
            msg.ExpTime = rev.getExptime()
            msg.xPd = rev.getXpdList()
            msg.yPd = rev.getYpdList()
            $.get(url+new Date().getTime(), function (str) {
                jeBox.open({
                    title: [title, {
                        'text-align': 'center',
                        'font-size': '1.5em'
                    }],
                    type: 'dialog',
                    maskLock: true, //是否遮罩
                    maskClose: false,
                    isDrag: true,
                    shadow: true,
                    closeBtn: true,
                    boxSize: ['60%', 540],
                    zIndex: 1,
                    content: str,
                    success: function () {
                        initDbAdv(msg,chart)
                    }
                })
            })
        })
    }
    //查询数据库
    function selectToDB(pageIndex) {
        let fTxt = $('#dbFilterTxt').val()
        let fType = dbDataType.get_value('dbDataType')
        let sampleType = []
        fType.forEach(cur=>sampleType.push(cur.id))
        if(sampleType.length===0) return jeBox.msg($.i18n.prop('tips-db-typeNull'),{icon:1})
        let data = {}
        data.dbMode = dbType
        data.stritemNm ='10'
        data.pageIndex = pageIndex
        data.searchString=fTxt
        data.sampleTypes = sampleType
        websocket.send(funcCode.SelectToDBVague,data,false)
        main.setCallbacks(funcCode.SelectToDBVague,rev=>{
            addData([])//清空表格
            let infos = rev.getTableinfosList()
            if(infos.length===0) return jeBox.msg($.i18n.prop('tips-db-noSelect'),{icon:1})
            dataCount = rev.getItems()
            pageCount = Math.ceil(dataCount/10)

            $('#dbPage').prop('hidden',false)
            $("#dbNowPage").text(pageIndex)
            $("#dbDataCount").text(dataCount)
            $("#dbPageCount").text(pageCount)
            currentPage()

            let result = []
            for (let i = 0; i < infos.length; i++) {
                //let info = proto.Inter930.TableInfo.deserializeBinary(infos[i])
                let temp = {id:infos[i].getId(),num:i+1,cName:infos[i].getNamecn(),eName:infos[i].getNameen(),sampleCode:infos[i].getCode()}
                result.push(temp)
            }
            addData(result)
        })
    }
    //添加数据到数据库
    function addDataToDB() {
        if (lineInfo === '') return jeBox.msg($.i18n.prop('tips-db-add'),{icon:1})
        let data = {}
        let name = dbAddLines.val()
        let lineData = main.chart.series(name).get_data()
        data.zhName = $("#dbZhName").val()
        data.enName = $("#dbEnName").val()
        data.strSample_Code = ''
        data.strScanMode = lineInfo.strScanMode
        data.strWave = lineInfo.strWave
        data.powerValue = lineInfo.powervalue
        data.grating = lineInfo.grating
        data.Pinhole = lineInfo.pinhole
        data.slit = lineInfo.slit
        data.expTime = lineInfo.ExpTime
        data.unit = lineInfo.unit
        data.strCenterWave = lineInfo.strCenterWave
        data.strStartWave = lineInfo.strStartWave
        data.strEndWave = lineInfo.strEndWave
        data.totalnum = lineInfo.totalnum
        data.strInterFlg = lineInfo.strInterFlg
        data.intervaltime =lineInfo.strIntervaltime
        data.intervalnum =lineInfo.intervalnum
        data.pdX = lineData.x
        data.pdY = lineData.y
        websocket.send(funcCode.addDataToDB,data,false)
        main.setCallbacks(funcCode.addDataToDB,rev=>{jeBox.msg($.i18n.prop('funCode-'+funcCode.addDataToDB)+$.i18n.prop('state-'+rev.getBstatus()),{icon:rev.getBstatus()?2:3})})
        main.setCallbacks(funcCode.dbAddRepetition,rev=>{if(rev.getBstatus())jeBox.msg($.i18n.prop('tips-db-code'),{icon:1})})
    }

    function updateAddParam() {

    dbAddLines.change(function () {
        let name = $(this).val();
        websocket.send(funcCode.getLineTitleByName, {lineName:name},false)
        main.setCallbacks(funcCode.getLineTitleByName,rev=>{
            let result =  rev.getTiptitle();
            console.log(result)
            if(result!==''){
                 lineInfo = JSON.parse(rev.getTiptitle())
                $("#dbPw").val(lineInfo.powervalue)
                $("#dbExCWave").val(lineInfo.strWave)
                $("#dbPinhole").val(lineInfo.pinhole)
                $("#dbTime").val(lineInfo.ExpTime)
            }
            addChart.remove_all();
            let data = main.chart.series(name).get_data()
            let line =  addChart.add_series(name,0)
            line.add_array(data.x,data.y)
        })

    })

    function dbCalc() {

        let org = calcChart.series(name).get_data()
        let data = {}
        data.calType = calcType
        data.dbClassType = calcDbType
        data.pdX = org.x
        data.pdY = org.y
        websocket.send(funcCode.Cal_DataToDB,data)
        calcTable.setData([])
        main.setCallbacks(funcCode.Cal_DataToDB,rev=>{
            let lg = localStorage.getItem("lg")
            let idArr = rev.getIdList()
            let temp = rev.getFilenamsList()
            let names = temp.slice(lg==="zh"?0:temp.length/2,lg==="zh"?temp.length/2:temp.length)
            let pdy = rev.getPdyList()
            let result = []
            for (let i = 0; i < idArr.length; i++) {
                let temp = {num:i+1,id:idArr[i],name:names[i],md:pdy[i].toFixed(4)}
                result.push(temp)
            }
            calcTable.setData(result)
        })
    }
    //更新计算界面
    function updateCalcParam(){
        //calcTable.setData(calcData)
        main.translate()
        dbCalcLines.empty()
        lines.forEach(cur=>{dbCalcLines.append('<option>'+cur.name())})
        dbCalcLines.change()
    }
    dbCalcLines.change(function () {
        let name = $(this).val();
        if(name ===null) return jeBox.msg($.i18n.prop('tips-choseOneCur'),{icon:1})
        calcChart.remove_all();
        let data = main.chart.series(name).get_data()
        let line =  calcChart.add_series(name,0)
        line.add_array(data.x,data.y)
    })

    $("#localDB").change(function () {
        $("#selfDB").prop('checked',false)
        dbType = 0
        page = 1
        getDbDataType()
    })
    $("#selfDB").change(function () {
        $("#localDB").prop('checked',false)
        dbType = 1
        page = 1
        getDbDataType()
    })


    $("#calcLocalDb").change(function () {
        $("#calcSelfDb").prop('checked',false)
        calcDbType = 0
    })
    $("#calcSelfDb").change(function () {
        $("#calcLocalDb").prop('checked',false)
        calcDbType = 1
    })
    $("#pure").change(function () {
        $("#mixture").prop('checked',false)
        calcType = 0
    })
    $("#mixture").change(function () {
        $("#pure").prop('checked',false)
        calcType = 1
    })
    //监听当前页数
    function currentPage() {
        let nowPage = parseInt($("#dbNowPage").text())
        $('#prevPageBtn').prop("disabled",nowPage===1)
        $('#nextPageBtn').prop('disabled',nowPage===pageCount)
    }
    //上一页
    function prevPage(){
        page--
        selectToDB(page)
    }
    //下一页
    function nextPage() {
        page++
        selectToDB(page)
    }

</script>
